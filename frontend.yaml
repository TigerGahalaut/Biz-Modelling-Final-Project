apiVersion: v1
kind: ConfigMap
metadata:
  name: reachright-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReachRight — Cold Email Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #111111;
        --surface2: #181818;
        --border: #2a2a2a;
        --accent: #4a9ff0;
        --accent2: #4acff0;
        --text: #f0f0f0;
        --muted: #666;
        --danger: #f04a4a;
      }
    
      * { box-sizing: border-box; margin: 0; padding: 0; }
    
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        min-height: 100vh;
        overflow-x: hidden;
      }
    
      /* Background grid */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
    
      .container {
        position: relative;
        z-index: 1;
        max-width: 860px;
        margin: 0 auto;
        padding: 60px 24px 120px;
      }
    
      /* Header */
      header {
        margin-bottom: 64px;
        animation: fadeUp 0.6s ease both;
      }
    
      .logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
    
      .logo::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 2s ease infinite;
      }
    
      h1 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: clamp(36px, 6vw, 64px);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
    
      h1 span {
        color: var(--accent);
      }
    
      .tagline {
        margin-top: 16px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.05em;
      }
    
      /* Form */
      .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 40px;
        margin-bottom: 24px;
        animation: fadeUp 0.6s 0.15s ease both;
      }
    
      .step-label {
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
      }
    
      .field-title {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 6px;
      }
    
      .field-desc {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 20px;
        line-height: 1.6;
      }
    
      /* File drop zone */
      .drop-zone {
        border: 1px dashed var(--border);
        border-radius: 2px;
        padding: 40px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        background: var(--surface2);
      }
    
      .drop-zone:hover, .drop-zone.dragging {
        border-color: var(--accent);
        background: rgba(200,240,74,0.04);
      }
    
      .drop-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
    
      .drop-icon {
        font-size: 28px;
        margin-bottom: 12px;
        opacity: 0.4;
      }
    
      .drop-text {
        font-size: 13px;
        color: var(--muted);
      }
    
      .drop-text strong {
        color: var(--accent);
        font-weight: 400;
      }
    
      .file-selected {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: rgba(200,240,74,0.06);
        border: 1px solid rgba(200,240,74,0.2);
        border-radius: 2px;
        font-size: 13px;
        margin-top: 12px;
      }
    
      .file-selected.visible { display: flex; }
    
      .file-selected .file-name {
        color: var(--accent);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    
      .file-remove {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        padding: 0;
        line-height: 1;
        transition: color 0.15s;
      }
      .file-remove:hover { color: var(--danger); }
    
      /* Divider */
      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 36px 0;
      }
    
      /* Text input */
      .text-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 16px 18px;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        resize: vertical;
        min-height: 80px;
        transition: border-color 0.2s;
        outline: none;
      }
    
      .text-input:focus {
        border-color: var(--accent);
      }
    
      .text-input::placeholder { color: var(--muted); }
    
      /* Submit button */
      .submit-btn {
        width: 100%;
        padding: 18px;
        background: var(--accent);
        color: #0a0a0a;
        border: none;
        border-radius: 2px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.6s 0.3s ease both;
      }
    
      .submit-btn:hover:not(:disabled) {
        background: #6ab4ff;
        transform: translateY(-1px);
        box-shadow: 0 8px 32px rgba(74,159,240,0.25);
      }
    
      .submit-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
    
      .submit-btn .btn-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
    
      /* Loading state */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(0,0,0,0.3);
        border-top-color: #0a0a0a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
    
      .loading .spinner { display: block; }
      .loading .btn-text::after {
        content: '';
        animation: dots 1.2s steps(3, end) infinite;
      }
    
      /* Status */
      .status-bar {
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-align: center;
        margin-top: 14px;
        min-height: 18px;
        animation: fadeUp 0.6s 0.35s ease both;
      }
    
      .status-bar.error { color: var(--danger); }
      .status-bar.success { color: var(--accent2); }
    
      /* Results */
      .results-section {
        display: none;
        animation: fadeUp 0.5s ease both;
      }
    
      .results-section.visible { display: block; }
    
      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
    
      .results-title {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent2);
      }
    
      .results-meta {
        font-size: 11px;
        color: var(--muted);
      }
    
      .email-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 2px;
        margin-bottom: 16px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
    
      .email-card:hover { border-color: #333; }
    
      .email-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }
    
      .email-type {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
    
      .type-executive { color: #f0c84a; }
      .type-founder { color: var(--accent); }
      .type-recruiter { color: var(--accent2); }
      .type-scored { color: #c84af0; }
    
      .email-toggle {
        font-size: 11px;
        color: var(--muted);
        transition: transform 0.2s;
      }
    
      .email-card.open .email-toggle { transform: rotate(180deg); }
    
      .email-body {
        display: none;
        padding: 24px 20px;
      }
    
      .email-card.open .email-body { display: block; }
    
      .email-text {
        font-size: 13px;
        line-height: 1.8;
        color: #ccc;
        white-space: pre-wrap;
        word-break: break-word;
      }
    
      .copy-btn {
        margin-top: 16px;
        padding: 8px 16px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.05em;
      }
    
      .copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
    
      .copy-btn.copied {
        border-color: var(--accent2);
        color: var(--accent2);
      }
    
      .mailto-btn {
        margin-top: 16px;
        padding: 8px 16px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.05em;
      }
    
      .mailto-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
    
      /* Accept / Decline */
      .action-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
    
      .accept-btn {
        padding: 10px 20px;
        background: var(--accent);
        color: #0a0a0a;
        border: none;
        border-radius: 2px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
    
      .accept-btn:hover { background: #6ab4ff; }
    
      .decline-btn {
        padding: 10px 20px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 2px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
    
      .decline-btn:hover { border-color: var(--danger); color: var(--danger); }
    
      .accepted-banner {
        display: none;
        margin-top: 16px;
        padding: 16px 20px;
        background: rgba(74,159,240,0.08);
        border: 1px solid rgba(74,159,240,0.25);
        border-radius: 2px;
        font-size: 12px;
        line-height: 1.7;
        color: var(--accent2);
        animation: fadeUp 0.3s ease both;
      }
    
      .accepted-banner.visible { display: block; }
      .accepted-banner strong { color: var(--accent); font-weight: 400; }
    
      .declined-banner {
        display: none;
        margin-top: 16px;
        padding: 16px 20px;
        background: rgba(240,74,74,0.06);
        border: 1px solid rgba(240,74,74,0.2);
        border-radius: 2px;
        font-size: 12px;
        color: var(--muted);
        animation: fadeUp 0.3s ease both;
      }
    
      .declined-banner.visible { display: block; }
    
      /* Raw output (fallback) */
      .raw-output {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 24px;
        font-size: 12px;
        line-height: 1.8;
        color: #bbb;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 600px;
        overflow-y: auto;
      }
    
      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
    
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.8); }
      }
    
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    
      @keyframes dots {
        0% { content: ''; }
        33% { content: '.'; }
        66% { content: '..'; }
        100% { content: '...'; }
      }
    
      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
    </head>
    <body>
    <div class="container">
    
      <header>
        <div class="logo">ReachRight</div>
        <h1>Cold emails that<br>actually <span>land.</span></h1>
        <p class="tagline">// upload resume → describe target → get personalised emails</p>
      </header>
    
      <div class="form-card">
        <div class="step-label">Step 01 — Resume</div>
        <div class="field-title">Upload your resume</div>
        <p class="field-desc">PDF preferred. This tells ReachRight what to highlight about you.</p>
    
        <div class="drop-zone" id="dropZone">
          <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" />
          <div class="drop-icon">📄</div>
          <div class="drop-text"><strong>Click to upload</strong> or drag and drop</div>
          <div class="drop-text" style="margin-top:6px;font-size:11px;">PDF, DOCX, TXT</div>
        </div>
    
        <div class="file-selected" id="fileSelected">
          <span>📎</span>
          <span class="file-name" id="fileName"></span>
          <button class="file-remove" id="fileRemove" title="Remove">×</button>
        </div>
    
        <hr class="divider">
    
        <div class="step-label">Step 02 — Target</div>
        <div class="field-title">Who do you want to reach?</div>
        <p class="field-desc">Describe the type of person or role. Be specific — the more context, the better the email.</p>
    
        <textarea
          class="text-input"
          id="rolesInput"
          placeholder="e.g. ML engineering manager at an AI startup in San Francisco"
          rows="3"
        ></textarea>
      </div>
    
      <button class="submit-btn" id="submitBtn" disabled>
        <div class="btn-inner">
          <div class="spinner" id="spinner"></div>
          <span class="btn-text" id="btnText">Generate Emails</span>
        </div>
      </button>
    
      <div class="status-bar" id="statusBar"></div>
    
      <!-- Results -->
      <div class="results-section" id="resultsSection">
        <div class="results-header">
          <div class="results-title">// Generated Emails</div>
          <div class="results-meta" id="resultsMeta"></div>
        </div>
        <div id="emailCards"></div>
      </div>
    
    </div>
    
    <script>
      const FLOW_URL = 'http://35.224.85.248/api/v1/run/666a1d2a-f84a-4471-af6a-253151002136';
      const API_KEY = 'sk-YzZBo7DBWmlnoKCQDB9NI4ULZlk8GZ1zYkUuXxsNVkI';
    
      const resumeFileInput = document.getElementById('resumeFile');
      const dropZone = document.getElementById('dropZone');
      const fileSelected = document.getElementById('fileSelected');
      const fileName = document.getElementById('fileName');
      const fileRemove = document.getElementById('fileRemove');
      const rolesInput = document.getElementById('rolesInput');
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const statusBar = document.getElementById('statusBar');
      const resultsSection = document.getElementById('resultsSection');
      const emailCards = document.getElementById('emailCards');
      const resultsMeta = document.getElementById('resultsMeta');
    
      let selectedFile = null;
    
      function checkReady() {
        submitBtn.disabled = !(selectedFile && rolesInput.value.trim().length > 3);
      }
    
      // File handling
      resumeFileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) setFile(e.target.files[0]);
      });
    
      function setFile(file) {
        selectedFile = file;
        fileName.textContent = file.name;
        fileSelected.classList.add('visible');
        checkReady();
      }
    
      fileRemove.addEventListener('click', () => {
        selectedFile = null;
        resumeFileInput.value = '';
        fileSelected.classList.remove('visible');
        checkReady();
      });
    
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragging'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragging');
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
      });
    
      rolesInput.addEventListener('input', checkReady);
    
      // Submit
      submitBtn.addEventListener('click', async () => {
        if (!selectedFile || !rolesInput.value.trim()) return;
    
        setLoading(true);
        setStatus('Finding prospect and generating emails...', '');
        resultsSection.classList.remove('visible');
    
        try {
          // Upload file first to get file path
          const formData = new FormData();
          formData.append('file', selectedFile);
    
          setStatus('Uploading resume...', '');
          const uploadRes = await fetch('http://35.224.85.248/api/v2/files', {
            method: 'POST',
            headers: { 'x-api-key': API_KEY },
            body: formData
          });
    
          if (!uploadRes.ok) throw new Error(`File upload failed: ${uploadRes.status}`);
          const uploadData = await uploadRes.json();
          const filePath = '/' + (uploadData.path || uploadData.file_path || uploadData.id);
    
          setStatus('Searching LinkedIn and writing emails...', '');
    
          // Run the flow
          const payload = {
            output_type: 'any',
            input_type: 'text',
            input_value: rolesInput.value.trim(),
            session_id: Date.now().toString() + Math.random().toString(36).slice(2),
            tweaks: {
              'File-Nyzfo': { path: [filePath] }
            }
          };
    
          const runRes = await fetch(FLOW_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': API_KEY
            },
            body: JSON.stringify(payload)
          });
    
          if (!runRes.ok) {
            const errText = await runRes.text();
            throw new Error(`Flow error ${runRes.status}: ${errText.slice(0, 200)}`);
          }
    
          const runData = await runRes.json();
          console.log('FULL RESPONSE:', JSON.stringify(runData, null, 2));
          displayResults(runData);
          setStatus('Done!', 'success');
    
        } catch (err) {
          console.error(err);
          setStatus(`Error: ${err.message}`, 'error');
        } finally {
          setLoading(false);
        }
      });
    
      function setLoading(on) {
        submitBtn.disabled = on;
        submitBtn.classList.toggle('loading', on);
        spinner.style.display = on ? 'block' : 'none';
        btnText.textContent = on ? 'Generating' : 'Generate Emails';
      }
    
      function setStatus(msg, type) {
        statusBar.textContent = msg;
        statusBar.className = 'status-bar' + (type ? ' ' + type : '');
      }
    
      function displayResults(data) {
        emailCards.innerHTML = '';
        resultsSection.classList.add('visible');
    
        const emailOutputs = [];
        const resumeOutputs = [];
    
        try {
          const runs = data.outputs || [];
          runs.forEach(run => {
            const outs = run.outputs || [];
            outs.forEach(out => {
              const componentName = (out.component_display_name || '').toLowerCase();
              const isResume = componentName.includes('resume');
    
              const artifacts = out.artifacts;
              const artifactList = Array.isArray(artifacts) ? artifacts : (artifacts ? [artifacts] : []);
              artifactList.forEach(a => {
                if (a.message && typeof a.message === 'string') {
                  (isResume ? resumeOutputs : emailOutputs).push({ text: a.message.trim(), component: out.component_display_name || '' });
                }
              });
            });
          });
        } catch (e) {
          console.warn('Parse error', e);
        }
    
        if (emailOutputs.length === 0 && resumeOutputs.length === 0) {
          emailCards.innerHTML = `<div class="raw-output">${JSON.stringify(data, null, 2)}</div>`;
          resultsMeta.textContent = 'raw output';
          return;
        }
    
        resultsMeta.textContent = `${emailOutputs.length} email${emailOutputs.length !== 1 ? 's' : ''} generated`;
    
        const typeLabels = ['Executive', 'Founder', 'Recruiter', 'Scored'];
        const typeClasses = ['type-executive', 'type-founder', 'type-recruiter', 'type-scored'];
    
        // Render email cards
        emailOutputs.forEach((out, i) => {
          const label = out.component || typeLabels[i] || `Email ${i+1}`;
          const typeClass = typeClasses[i] || 'type-founder';
          const card = document.createElement('div');
          card.className = `email-card${i === 0 ? ' open' : ''}`;
          card.innerHTML = `
            <div class="email-card-header">
              <span class="email-type ${typeClass}">${label}</span>
              <span class="email-toggle">▼</span>
            </div>
            <div class="email-body">
              <div class="email-text">${escapeHtml(out.text)}</div>
              <div class="action-row">
                <button class="accept-btn">✓ Use this email</button>
                <button class="decline-btn">✕ Not this one</button>
              </div>
              <div class="accepted-banner">
                Great choice! Click below to open this email in your mail app — the subject and body will be pre-filled.<br><br>
                <button class="mailto-btn" style="margin-top:0;">✉ Open in Email App</button>
                <br><small style="color:var(--muted);margin-top:8px;display:block;">Pro tip: double-check the subject line before sending!</small>
              </div>
              <div class="declined-banner">
                No worries! Click below to start fresh with a new search.
                <br><br>
                <button class="reset-btn" style="padding:10px 20px;background:transparent;border:1px solid #444;border-radius:2px;color:#ccc;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;" onclick="resetForm()">↺ Start Again</button>
              </div>
            </div>
          `;
    
          card.querySelector('.email-card-header').addEventListener('click', () => card.classList.toggle('open'));
                card.querySelector('.mailto-btn').addEventListener('click', function() {
            let emailText = out.text;
            const confIdx = emailText.indexOf('\nCONFIDENCE:');
            if (confIdx !== -1) emailText = emailText.substring(0, confIdx);
            // Extract subject line if present
            const subjectMatch = emailText.match(/^Subject:([^\n]*)\n/i);
            const subject = subjectMatch ? subjectMatch[1].trim() : 'Quick question';
            const body = emailText.replace(/^Subject:[^\n]*\n\n?/i, '').trim();
            const a = document.createElement('a');
            a.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          });
          card.querySelector('.accept-btn').addEventListener('click', function() {
            card.querySelector('.accepted-banner').classList.add('visible');
            card.querySelector('.declined-banner').classList.remove('visible');
            this.style.opacity = '0.4'; this.style.pointerEvents = 'none';
            card.querySelector('.decline-btn').style.opacity = '0.4';
            card.querySelector('.decline-btn').style.pointerEvents = 'none';
          });
          card.querySelector('.decline-btn').addEventListener('click', function() {
            card.querySelector('.declined-banner').classList.add('visible');
            card.querySelector('.accepted-banner').classList.remove('visible');
            this.style.opacity = '0.4'; this.style.pointerEvents = 'none';
            card.querySelector('.accept-btn').style.opacity = '0.4';
            card.querySelector('.accept-btn').style.pointerEvents = 'none';
          });
    
          emailCards.appendChild(card);
        });
    
        // Render resume suggestions section
        if (resumeOutputs.length > 0) {
          const resumeSection = document.createElement('div');
          resumeSection.style.cssText = 'margin-top: 48px;';
          resumeSection.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
              <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:#c84af0;">// Resume Suggestions</div>
            </div>
          `;
    
          resumeOutputs.forEach((out) => {
            const card = document.createElement('div');
            card.className = 'email-card open';
            card.style.borderColor = 'rgba(200,74,240,0.2)';
            card.innerHTML = `
              <div class="email-card-header" style="border-bottom-color:rgba(200,74,240,0.15);">
                <span class="email-type" style="color:#c84af0;">Improvement Suggestions</span>
                <span class="email-toggle">▼</span>
              </div>
              <div class="email-body">
                <div class="email-text">${renderMarkdown(out.text)}</div>
              </div>
            `;
            card.querySelector('.email-card-header').addEventListener('click', () => card.classList.toggle('open'));
            resumeSection.appendChild(card);
          });
    
          emailCards.appendChild(resumeSection);
        }
      }
    
      function resetForm() {
        // Clear file
        selectedFile = null;
        document.getElementById('resumeFile').value = '';
        document.getElementById('fileSelected').classList.remove('visible');
        // Clear roles input
        document.getElementById('rolesInput').value = '';
        // Hide results
        document.getElementById('resultsSection').classList.remove('visible');
        document.getElementById('emailCards').innerHTML = '';
        // Reset status
        document.getElementById('statusBar').textContent = '';
        document.getElementById('statusBar').className = 'status-bar';
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
        // Disable submit
        submitBtn.disabled = true;
      }
    
      function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    
      function renderMarkdown(str) {
        return escapeHtml(str)
          .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e0e0e0;font-weight:600;">$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/^(\d+)\.\s+(.+)$/gm, '<div style="margin:14px 0 4px;color:#e0e0e0;"><span style="color:#c84af0;margin-right:8px;font-weight:700;">$1.</span>$2</div>')
          .replace(/^[\*\-]\s+(.+)$/gm, '<div style="margin:4px 0 4px 20px;display:flex;gap:8px;"><span style="color:#c84af0;margin-top:1px;">›</span><span>$1</span></div>')
          .replace(/\n/g, '<br>');
      }
    
      function escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      }
    </script>
    </body>
    </html>
    
    

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reachright-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reachright-frontend
  template:
    metadata:
      labels:
        app: reachright-frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: reachright-html
---
apiVersion: v1
kind: Service
metadata:
  name: reachright-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: reachright-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
